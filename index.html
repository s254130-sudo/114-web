<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>114-web 網頁開發作品集</title>
    <!-- 引入 Google 字體 -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #4facfe;
            --secondary-color: #00f2fe;
            --bg-color: #f8fafc;
            --text-color: #1e293b;
            --card-bg: rgba(255, 255, 255, 0.8);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: var(--bg-color);
            background-image: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }

        header {
            text-align: center;
            margin-bottom: 50px;
        }

        header h1 {
            font-size: 2.5rem;
            background: linear-gradient(to right, #4facfe 0%, #00f2fe 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        header p {
            color: #64748b;
            font-weight: 300;
        }

        .container {
            width: 100%;
            max-width: 1000px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
        }

        .lab-card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            text-decoration: none;
            color: inherit;
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .lab-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.15);
            background: #ffffff;
        }

        .lab-number {
            font-size: 0.9rem;
            font-weight: 700;
            color: var(--primary-color);
            text-transform: uppercase;
            margin-bottom: 15px;
        }

        .lab-title {
            font-size: 1.5rem;
            margin-bottom: 15px;
            color: var(--text-color);
        }

        .lab-desc {
            font-size: 0.95rem;
            color: #475569;
            line-height: 1.6;
            margin-bottom: 20px;
        }

        .btn {
            align-self: flex-start;
            padding: 8px 20px;
            background: linear-gradient(to right, var(--primary-color), var(--secondary-color));
            color: white;
            border-radius: 30px;
            font-size: 0.9rem;
            font-weight: 500;
            transition: opacity 0.2s;
        }

        .lab-card:hover .btn {
            opacity: 0.9;
        }

        footer {
            margin-top: auto;
            padding-top: 50px;
            font-size: 0.85rem;
            color: #94a3b8;
        }

        /* 響應式調整 */
        @media (max-width: 640px) {
            header h1 { font-size: 2rem; }
            .container { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <header>
        <h1>114-web 課程作品集</h1>
        <p>探索我的網頁開發實驗與練習</p>
    </header>

    <main class="container">
        <!-- Lab 1 卡片 -->
        <a href="lab1/index.html" class="lab-card">
            <div>
                <div class="lab-number">實驗 01</div>
                <h2 class="lab-title">基礎 HTML 與 CSS</h2>
                <p class="lab-desc">學習網頁的基本骨架與樣式美化，包含標籤使用、顏色設定與文字排版。</p>
            </div>
            <div class="btn">進入練習</div>
        </a>

        <!-- Lab 2 卡片 -->
        <a href="lab2/index.html" class="lab-card">
            <div>
                <div class="lab-number">實驗 02</div>
                <h2 class="lab-title">Flexbox 佈局進階</h2>
                <p class="lab-desc">深入研究彈性盒子模型，實現各種現代化的網頁對齊與排版技術。</p>
            </div>
            <div class="btn">進入練習</div>
        </a>

        <!-- Lab 3 卡片 -->
        <a href="lab3/index.html" class="lab-card">
            <div>
                <div class="lab-number">實驗 03</div>
                <h2 class="lab-title">RWD 響應式設計</h2>
                <p class="lab-desc">學習使用 Media Queries，讓網頁在手機、平板與桌機上都能完美呈現。</p>
            </div>
            <div class="btn">進入練習</div>
        </a>
    </main>

    <footer>
        &copy; 2024 114-web 作品集 | 由 Gemini 輔助設計
    </footer>

</body>
</html>
