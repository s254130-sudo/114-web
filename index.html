<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的一頁式網站</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- 導覽列 -->
<nav>
    <h1 class="logo">MySite</h1>
    <ul>
        <li><a href="#home">首頁</a></li>
        <li><a href="#about">關於我</a></li>
        <li><a href="#portfolio">作品</a></li>
        <li><a href="#contact">聯絡</a></li>
    </ul>
</nav>

<!-- 首頁 -->
<section id="home" class="section home">
    <h2>歡迎來到我的網站</h2>
    <p>這是一個簡單的一頁式網站範例</p>
</section>

<!-- 關於我 -->
<section id="about" class="section">
    <h2>關於我</h2>
    <p>
        我是一名高職學生，正在學習 HTML、CSS 和網站設計。
        希望未來能成為前端工程師。
    </p>
</section>

<!-- 作品 -->
<section id="portfolio" class="section gray">
    <h2>我的作品</h2>

    <div class="cards">

        <div class="card">
            <h3>作品 1</h3>
            <p>簡單的網頁設計</p>
        </div>

        <div class="card">
            <h3>作品 2</h3>
            <p>CSS 練習作品</p>
        </div>

        <div class="card">
            <h3>作品 3</h3>
            <p>JavaScript 小專案</p>
        </div>

    </div>
</section>

<!-- 聯絡 -->
<section id="contact" class="section">
    <h2>聯絡我</h2>
    <p>Email: example@email.com</p>
</section>

<footer>
    <p>© 2026 MySite</p>
</footer>

</body>
</html>
