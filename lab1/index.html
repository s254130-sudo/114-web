<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>幸運抽籤大轉盤</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap');
        
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
        }

        #wheel-container {
            position: relative;
            width: 320px;
            height: 320px;
            margin: 0 auto;
        }

        #wheel-svg {
            width: 100%;
            height: 100%;
            transform: rotate(-90deg);
            transition: transform 4s cubic-bezier(0.15, 0, 0.15, 1);
        }

        .pointer {
            position: absolute;
            top: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 15px solid transparent;
            border-right: 15px solid transparent;
            border-top: 30px solid #ef4444;
            z-index: 10;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2));
        }

        .history-item {
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateX(-10px); }
            to { opacity: 1; transform: translateX(0); }
        }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-2xl mx-auto bg-white rounded-2xl shadow-2xl overflow-hidden">
        <!-- Header -->
        <div class="bg-indigo-600 p-6 text-white text-center">
            <h1 class="text-3xl font-bold">🎡 幸運大轉盤</h1>
            <p class="mt-2 opacity-80">轉動命運，決定你的驚喜</p>
        </div>

        <div class="p-6 space-y-8">
            <!-- Wheel Section -->
            <div class="flex flex-col items-center">
                <div id="wheel-container">
                    <div class="pointer"></div>
                    <svg id="wheel-svg" viewBox="0 0 100 100"></svg>
                </div>
                
                <div id="resultDisplay" class="mt-8 h-12 flex items-center justify-center text-3xl font-black text-indigo-600 text-center w-full px-4">
                    準備好了嗎？
                </div>
                
                <button id="drawBtn" class="mt-4 bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 px-12 rounded-full text-xl shadow-lg transform active:scale-95 transition-all">
                    開始轉動
                </button>
            </div>

            <!-- Input Section -->
            <div class="border-t pt-6">
                <label class="block text-gray-700 font-bold mb-2">請輸入抽籤名單 (每行一個項目)：</label>
                <textarea id="nameList" rows="4" class="w-full p-4 border-2 border-gray-200 rounded-xl focus:border-indigo-500 focus:outline-none transition-colors" placeholder="請輸入項目...">王小明&#10;李大華&#10;張美麗&#10;趙主任&#10;陳老師</textarea>
            </div>

            <!-- History Section -->
            <div class="border-t pt-6">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-xl font-bold text-gray-800">歷史紀錄</h2>
                    <button id="clearHistory" class="text-sm text-gray-500 hover:text-red-500 transition-colors">清除紀錄</button>
                </div>
                <div id="historyList" class="flex flex-wrap gap-2">
                    <p class="text-gray-400 italic">尚無抽籤紀錄</p>
                </div>
            </div>
        </div>
    </div>

    <!-- UI Message Box -->
    <div id="messageBox" class="fixed bottom-10 left-1/2 -translate-x-1/2 bg-gray-800 text-white px-6 py-3 rounded-full shadow-2xl opacity-0 transition-opacity pointer-events-none z-50">
        請輸入名單後再開始！
    </div>

    <script>
        const nameListInput = document.getElementById('nameList');
        const drawBtn = document.getElementById('drawBtn');
        const resultDisplay = document.getElementById('resultDisplay');
        const historyList = document.getElementById('historyList');
        const clearHistoryBtn = document.getElementById('clearHistory');
        const messageBox = document.getElementById('messageBox');
        const wheelSvg = document.getElementById('wheel-svg');

        let isDrawing = false;
        let history = [];
        let currentRotation = 0;
        const colors = ['#6366f1', '#8b5cf6', '#ec4899', '#f43f5e', '#f59e0b', '#10b981', '#06b6d4', '#3b82f6'];

        function showMessage(msg) {
            messageBox.textContent = msg;
            messageBox.classList.remove('opacity-0');
            setTimeout(() => messageBox.classList.add('opacity-0'), 2000);
        }

        function createWheel() {
            const names = getNames();
            if (names.length === 0) {
                wheelSvg.innerHTML = `<circle cx="50" cy="50" r="45" fill="#f3f4f6" />`;
                return;
            }

            const sliceAngle = 360 / names.length;
            let svgContent = '';

            names.forEach((name, i) => {
                const startAngle = i * sliceAngle;
                const endAngle = (i + 1) * sliceAngle;
                
                // SVG arc path calculation
                const x1 = 50 + 45 * Math.cos(Math.PI * startAngle / 180);
                const y1 = 50 + 45 * Math.sin(Math.PI * startAngle / 180);
                const x2 = 50 + 45 * Math.cos(Math.PI * endAngle / 180);
                const y2 = 50 + 45 * Math.sin(Math.PI * endAngle / 180);

                const largeArcFlag = sliceAngle > 180 ? 1 : 0;
                const pathData = `M 50 50 L ${x1} ${y1} A 45 45 0 ${largeArcFlag} 1 ${x2} ${y2} Z`;
                
                svgContent += `<path d="${pathData}" fill="${colors[i % colors.length]}" stroke="white" stroke-width="0.5" />`;
                
                // Add text
                const textAngle = startAngle + sliceAngle / 2;
                const tx = 50 + 25 * Math.cos(Math.PI * textAngle / 180);
                const ty = 50 + 25 * Math.sin(Math.PI * textAngle / 180);
                
                svgContent += `
                    <text x="${tx}" y="${ty}" fill="white" font-size="4" font-weight="bold" 
                          text-anchor="middle" alignment-baseline="middle" 
                          transform="rotate(${textAngle}, ${tx}, ${ty})">
                        ${name.length > 5 ? name.substring(0, 4) + '..' : name}
                    </text>
                `;
            });

            wheelSvg.innerHTML = svgContent;
        }

        function getNames() {
            return nameListInput.value.trim().split('\n').map(n => n.trim()).filter(n => n !== '');
        }

        function updateHistoryUI() {
            if (history.length === 0) {
                historyList.innerHTML = '<p class="text-gray-400 italic">尚無抽籤紀錄</p>';
                return;
            }
            historyList.innerHTML = history.map(name => `
                <span class="history-item bg-indigo-50 text-indigo-700 px-3 py-1 rounded-lg border border-indigo-200 text-sm">
                    ${name}
                </span>
            `).join('');
        }

        drawBtn.addEventListener('click', () => {
            if (isDrawing) return;

            const names = getNames();
            if (names.length < 2) {
                showMessage('⚠️ 請輸入至少兩個名單項目以製作轉盤！');
                return;
            }

            isDrawing = true;
            drawBtn.disabled = true;
            drawBtn.classList.add('opacity-50');
            resultDisplay.textContent = "轉動中...";

            // Random rotation: at least 5 full circles + random angle
            const extraRotation = Math.floor(Math.random() * 360) + 1800; 
            currentRotation += extraRotation;
            
            wheelSvg.style.transform = `rotate(${currentRotation - 90}deg)`;

            setTimeout(() => {
                // Calculate which slice is at the top (270 degrees in SVG coordinates is top)
                const normalizedRotation = (currentRotation % 360);
                const sliceAngle = 360 / names.length;
                
                // The pointer is at the top (SVG -90deg or 270deg relative to start)
                // Index = (TotalAngle - (currentRotation % 360)) / sliceAngle
                let winningIndex = Math.floor((360 - normalizedRotation) / sliceAngle) % names.length;
                if (winningIndex < 0) winningIndex += names.length;

                const finalWinner = names[winningIndex];
                
                resultDisplay.textContent = `🎉 ${finalWinner}`;
                
                history.unshift(finalWinner);
                if (history.length > 20) history.pop();
                updateHistoryUI();

                isDrawing = false;
                drawBtn.disabled = false;
                drawBtn.classList.remove('opacity-50');
            }, 4000); // Must match transition duration
        });

        nameListInput.addEventListener('input', createWheel);
        clearHistoryBtn.addEventListener('click', () => {
            history = [];
            updateHistoryUI();
        });

        // Init
        window.onload = () => {
            createWheel();
        };
    </script>
</body>
</html>
